name: Nightly

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC every day
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install F* (latest nightly)
        run: ./setup.sh binary

      - name: Show F* version
        run: ./fstar/bin/fstar.exe --version

      - name: Verify all chapters
        run: make -C autoclrs -j$(nproc)
